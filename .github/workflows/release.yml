name: release

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '*.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write   # create tags + GitHub releases
  packages: write   # push images to GHCR

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version from PostgreSQL
        id: ver
        run: |
          set -euo pipefail
          # PostgreSQL version is pinned in the Dockerfile as `ENV PG_VERSION=<maj.min>-...`.
          # We mirror its MAJOR.MINOR; the patch is the only digit our CI increments.
          pg_raw="$(grep -iE '^ENV +PG_VERSION=' Dockerfile | grep -oE '[0-9]+\.[0-9]+' | head -1)"
          pg_major="${pg_raw%%.*}"
          pg_minor="${pg_raw#*.}"
          mm="${pg_major}.${pg_minor}"

          # Our patch number = (highest existing patch for this MAJOR.MINOR) + 1.
          git fetch --tags --force --quiet
          latest="$(git tag --list "${mm}.*" | sort -V | tail -n1 || true)"
          if [ -z "${latest}" ]; then patch=0; else patch=$(( ${latest##*.} + 1 )); fi
          version="${mm}.${patch}"

          echo "PostgreSQL ${mm} -> release ${version}"
          {
            echo "version=${version}"
            echo "pg_major=${pg_major}"
            echo "pg_mm=${mm}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.pg_mm }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.pg_major }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=postgis-pgvector
            org.opencontainers.image.description=PostgreSQL + PostGIS + pgvector
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          PG_MM: ${{ steps.ver.outputs.pg_mm }}
          PG_MAJOR: ${{ steps.ver.outputs.pg_major }}
        run: |
          set -euo pipefail
          {
            printf 'PostgreSQL %s + PostGIS + pgvector.\n\n' "${PG_MM}"
            printf 'Pull:\n\n'
            printf '    docker pull %s:%s\n\n' "${IMAGE}" "${VERSION}"
            printf 'Moving tags updated to this build: `%s`, `%s`, `latest`.\n' "${PG_MM}" "${PG_MAJOR}"
          } > notes.md
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes-file notes.md
