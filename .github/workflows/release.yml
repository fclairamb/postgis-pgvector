name: release

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint-initdb.d/**'
      - '.github/workflows/release.yml'
  schedule:
    # Weekly rebuild to pull in Debian + pgvector security fixes even when our
    # own files haven't changed. Each rebuild publishes a new patch release.
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # create tags + GitHub releases
  packages: write   # push images to GHCR

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version from PostgreSQL
        id: ver
        run: |
          set -euo pipefail
          # Resolve the base image reference (tag, possibly digest-pinned) from the FROM line.
          base="$(grep -iE '^FROM ' Dockerfile | head -1 | awk '{print $2}')"
          echo "Base image: ${base}"
          docker pull "${base}"

          # Ask the base image's PostgreSQL binary for its version (MAJOR.MINOR).
          pg_raw="$(docker run --rm --entrypoint postgres "${base}" --version \
                    | grep -oE '[0-9]+(\.[0-9]+)?' | head -1)"
          pg_major="${pg_raw%%.*}"
          if [ "${pg_raw}" = "${pg_major}" ]; then pg_minor=0; else pg_minor="${pg_raw#*.}"; fi
          mm="${pg_major}.${pg_minor}"

          # Our patch number = (highest existing patch for this MAJOR.MINOR) + 1.
          git fetch --tags --force --quiet
          latest="$(git tag --list "${mm}.*" | sort -V | tail -n1 || true)"
          if [ -z "${latest}" ]; then patch=0; else patch=$(( ${latest##*.} + 1 )); fi
          version="${mm}.${patch}"

          echo "PostgreSQL ${mm} -> release ${version}"
          {
            echo "version=${version}"
            echo "pg_major=${pg_major}"
            echo "pg_mm=${mm}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.pg_mm }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.pg_major }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=postgis-pgvector
            org.opencontainers.image.description=PostgreSQL + PostGIS + pgvector
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          PG_MM: ${{ steps.ver.outputs.pg_mm }}
          PG_MAJOR: ${{ steps.ver.outputs.pg_major }}
        run: |
          set -euo pipefail
          {
            printf 'PostgreSQL %s + PostGIS + pgvector.\n\n' "${PG_MM}"
            printf 'Pull:\n\n'
            printf '    docker pull %s:%s\n\n' "${IMAGE}" "${VERSION}"
            printf 'Moving tags updated to this build: `%s`, `%s`, `latest`.\n' "${PG_MM}" "${PG_MAJOR}"
          } > notes.md
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes-file notes.md
